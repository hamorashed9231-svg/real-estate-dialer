services:
  # 1. Express Backend Web Service
  - type: web
    name: propdial-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install && npx prisma generate && npm run build
    startCommand: cd backend && npx prisma db push && npm start
    envVars:
      - key: PORT
        value: "5000"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: postgresql://neondb_owner:npg_YZ04TWiQsGBe@ep-nameless-mud-ahv0xjpp-pooler.c-3.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      - key: REDIS_URL
        value: rediss://default:gQAAAAAAAkxPAAIgcDIwYmU5ZmNhY2FiYjg0ZmY2YWFhOTI2Y2JjYmIzOWQyOQ@humorous-glider-150607.upstash.io:6379
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: TWILIO_ACCOUNT_SID
        value: "ACXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
      - key: TWILIO_AUTH_TOKEN
        value: "dummy_auth_token"
      - key: TWILIO_TWIML_APP_SID
        value: "APXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
      - key: TWILIO_API_KEY
        value: "SKXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
      - key: TWILIO_API_SECRET
        value: "dummy_api_secret"
      - key: TWILIO_NUMBER
        value: "+1234567890"
      - key: DNC_API_KEY
        value: "dummy_dnc_api_key"

  # 2. Vite Static Web Hosting
  - type: web
    name: propdial-frontend
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://propdial-backend.onrender.com # Point to the backend Web Service URL
    routes:
      # Single Page Application fallback routing
      - type: rewrite
        source: /*
        destination: /index.html
